#  Units — Special
# ═══════════════════════════════════════════════════════════════════════════
unit.spearhead.name=Spearhead
unit.spearhead.description=Một thiết giáp hạm bay hạng nặng thiết kế để dẫn đầu các cuộc tấn công. Áo giáp dày và vũ khí hủy diệt khiến nó trở thành mũi nhọn của Glacius.

unit.altiar.name=Altair
unit.altiar.description=Một tàu súng hỗ trợ trên không đa năng. Cung cấp hỏa lực yểm trợ và hỗ trợ chiến thuật, thích ứng với mọi tình huống chiến đấu.

