# ── New Universe Mod — Tiếng Việt ────────────────────────────────────────
# Bản địa hóa tiếng Việt cho tất cả nội dung trong mod.

# ═══════════════════════════════════════════════════════════════════════════
#  Planets
# ═══════════════════════════════════════════════════════════════════════════
planet.borealis.name=Borealis
planet.borealis.description=Một ngôi sao lùn đỏ mờ nhạt ở trung tâm một hệ thống chưa được khám phá. Ánh sáng yếu ớt của nó hầu như không chạm tới những thế giới băng giá quay quanh nó.

planet.erisa.name=Erisa
planet.erisa.description=Một hành tinh đá lạnh giá trong hệ Borealis, phủ đầy cánh đồng băng núi lửa lạnh và lớp băng vĩnh cửu giàu khoáng sản. Khí hậu khắc nghiệt ẩn chứa những tài nguyên quý giá bên dưới lớp băng vĩnh cửu.

# ═══════════════════════════════════════════════════════════════════════════
#  Items
# ═══════════════════════════════════════════════════════════════════════════

item.aurum.name=Aurum
item.aurum.description=Kim loại dẫn điện như vàng được tìm thấy sâu trong các miệng phun núi lửa của Erisa. Khả năng dẫn điện vượt trội khiến nó vô giá cho thiết bị điện tử và truyền tải năng lượng.

item.cophalast.name=Cophalast
item.cophalast.description=Một hợp chất khoáng dễ bay hơi hình thành trong các khe nứt kiến tạo của Erisa. Đặc tính dễ nổ khiến nó trở thành tài nguyên chiến lược cho sản xuất đạn dược.

item.duras.name=Duras
item.duras.description=Một hợp kim kết cấu siêu cứng được đặt tên theo độ bền của nó. Được sử dụng trong áo giáp hạng nặng và khung chịu lực trên khắp các công trình Glacius.

item.fabris.name=Fabris
item.fabris.description=Một vật liệu tổng hợp đa năng được ưa chuộng vì tính dễ uốn. Dễ dàng tạo hình thành các bộ phận chính xác trong khi vẫn duy trì tính toàn vẹn cấu trúc.

item.ferraloy.name=Ferraloy
item.ferraloy.description=Một hỗn hợp kim loại sắt được phát triển qua quy trình tinh chế tiên tiến. Sự ổn định phân tử của nó lý tưởng cho các thiết bị chính xác và hệ thống vũ khí.

item.flaxol.name=Flaxol
item.flaxol.description=Chất làm mát lạnh màu xanh lam được chiết xuất từ các đại dương dưới bề mặt của Erisa. Cần thiết cho điều nhiệt trong các quy trình công nghiệp nhiệt độ cực cao.

item.fortial.name=Fortial
item.fortial.description=Tấm ốp tổng hợp gia cố được thiết kế để chống va đập tối đa. Mọi tàu chiến Glacius đều dựa vào lớp fortial để bảo vệ áo giáp quan trọng.

item.horani.name=Horani
item.horani.description=Một tinh thể phóng xạ hiếm phát ra ánh sáng xanh lục đặc trưng. Cực kỳ nguy hiểm khi xử lý, nó là nguồn năng lượng mạnh mẽ cho các thiết kế lò phản ứng thử nghiệm.

item.navitas.name=Navitas
item.navitas.description=Một hợp chất nhiên liệu giàu năng lượng được chiết xuất từ hydrocarbon đã qua xử lý. Tính dễ cháy cao khiến nó trở thành nhiên liệu đẩy chính cho động cơ và máy phát điện Glacius.

item.pausis.name=Pausis
item.pausis.description=Một hợp chất ổn định màu xanh đậm giúp giảm dao động nhiệt. Không thể thiếu để duy trì điều kiện vận hành an toàn trong các cơ sở chế biến lạnh.

item.rudis.name=Rudis
item.rudis.description=Quặng khoáng thô chưa qua xử lý từ các mỏ lộ thiên của Erisa. Thô và không tinh khiết, phải được tinh chế trước khi sử dụng trong sản xuất tiên tiến.

item.sand.name=Cát
item.sand.description=Hạt cát silic bị phong hóa từ vùng cao nguyên đá của Erisa. Một vật liệu cơ bản nhưng thiết yếu cho sản xuất thủy tinh và xây dựng.

item.simus.name=Simus
item.simus.description=Các tấm kim loại đã qua xử lý đồng nhất, được cán nguội theo thông số chính xác. Vật liệu nền tảng cho mọi công trình kết cấu của Glacius.

item.tempered-glass.name=Thủy Tinh Tôi Luyện
item.tempered-glass.description=Hợp chất thủy tinh chịu nhiệt được thiết kế để chịu được sự thay đổi nhiệt độ cực đoan của Erisa. Được sử dụng trong cửa sổ quan sát, hệ thống quang học và lá chắn lò phản ứng.

item.tentias.name=Tentias
item.tentias.description=Một sợi polymer hữu cơ có độ bền kéo đáng kinh ngạc, thu hoạch từ các sinh vật trong hang động sâu. Cấu trúc linh hoạt và đàn hồi cho phép sản xuất vật liệu tổng hợp tiên tiến.

item.vastum.name=Vastum
item.vastum.description=Chất thải nguy hại từ quá trình xử lý công nghiệp. Hơi phóng xạ và bị ô nhiễm nặng, phải được lưu trữ cẩn thận để tránh thiệt hại môi trường.

item.viscosy.name=Viscosy
item.viscosy.description=Một chất bôi trơn công nghiệp đặc, sẫm màu có nguồn gốc từ trầm tích hữu cơ. Đặc tính nhớt của nó làm giảm ma sát trong máy móc hạng nặng hoạt động ở nhiệt độ dưới không.

item.xearula.name=Xearula
item.xearula.description=Một tinh thể màu hồng tím kỳ lạ có nguồn gốc không xác định, đang dao động với năng lượng bên trong. Cực kỳ hiếm và vô cùng giá trị, nó được săn đón cho nghiên cứu năng lượng tiên tiến.

# ═══════════════════════════════════════════════════════════════════════════
#  Blocks — Floors
# ═══════════════════════════════════════════════════════════════════════════
block.ice.name=Băng Glacius
block.ice.description=Lớp băng dày bao phủ bề mặt Erisa. Trơn trượt và lạnh giá, nó làm chậm di chuyển nhưng che giấu tài nguyên quý giá bên dưới.

block.regolith.name=Regolith Glacius
block.regolith.description=Đá vụn và bụi khoáng sản phủ trên vùng cao nguyên Erisa. Địa hình ổn định phù hợp cho phát triển cơ sở hạ tầng.

block.permafrost.name=Băng Vĩnh Cửu Glacius
block.permafrost.description=Mặt đất đóng băng vĩnh viễn giàu khoáng sản bị mắc kẹt. Nền tảng của mọi công trình xây dựng thuộc địa Glacius.

block.vent.name=Miệng Phun Glacius
block.vent.description=Miệng phun núi lửa lạnh phát ra hơi khoáng ấm. Nhiệt lượng tạo ra các mỏ khoáng sản hiếm xung quanh miệng phun.

block.deep-ice.name=Băng Sâu
block.deep-ice.description=Lớp băng cổ đại nén chặt từ lòng sông băng Erisa. Quá dày để có thể đi lại an toàn — đơn vị sẽ chết đuối trong bùn lạnh giá.

block.snow.name=Tuyết Glacius
block.snow.description=Tuyết tinh thể mịn bay trên bề mặt. Đẹp nhưng nguy hiểm, làm chậm mọi di chuyển trên mặt đất.

block.crust.name=Lớp Vỏ Glacius
block.crust.description=Lớp vỏ núi lửa cứng hóa hình thành từ các vụ phun trào cổ đại. Cung cấp chỗ đứng vững chắc gần các khu vực nhiệt.

block.slag-ice.name=Băng Xỉ
block.slag-ice.description=Băng tan chảy và đông lại cùng với khoáng chất núi lửa. Hỗn hợp bùn nguy hiểm này chảy như chất lỏng trên địa hình ấm.

# ═══════════════════════════════════════════════════════════════════════════
#  Blocks — Walls
# ═══════════════════════════════════════════════════════════════════════════
block.ice-wall.name=Tường Băng
block.ice-wall.description=Một rào cản tự nhiên bằng băng nén. Bảo vệ khỏi hỏa lực địch và các mối nguy hiểm môi trường.

block.regolith-wall.name=Tường Regolith
block.regolith-wall.description=Một bức tường chắc chắn bằng regolith nén. Phòng thủ cơ bản nhưng đáng tin cậy.

block.crystal-wall.name=Tường Pha Lê
block.crystal-wall.description=Một bức tường từ khoáng chất kết tinh phát sáng với năng lượng xanh. Bền hơn tường đá tiêu chuẩn.

block.volcanic-wall.name=Tường Núi Lửa
block.volcanic-wall.description=Một rào cản hình thành từ đá núi lửa nguội. Bề mặt tối của nó hấp thụ nhiệt và cung cấp sự bảo vệ tuyệt vời.

# ═══════════════════════════════════════════════════════════════════════════
#  Blocks — Ores
# ═══════════════════════════════════════════════════════════════════════════

block.ore-cophalast.name=Quặng Cophalast
block.ore-cophalast.description=Mạch khoáng đỏ chạy qua đá kiến tạo. Giàu hợp chất nổ.

block.ore-duras.name=Quặng Duras
block.ore-duras.description=Mỏ kim loại đặc với độ cứng đặc biệt. Nguồn gốc của hợp kim duras kết cấu.

block.ore-navitas.name=Quặng Navitas
block.ore-navitas.description=Mỏ giàu năng lượng màu vàng rực dường như phát ra ánh sáng riêng. Một nguồn nhiên liệu tập trung.

block.ore-pausis.name=Quặng Pausis
block.ore-pausis.description=Mạch ổn định xanh đậm nằm trong tường hang động. Cần thiết cho công nghệ điều nhiệt.

block.ore-vastum.name=Quặng Vastum
block.ore-vastum.description=Mỏ chất thải ô nhiễm, cặn bã còn sót lại từ chế biến công nghiệp. Hơi nguy hiểm khi xử lý.

# ═══════════════════════════════════════════════════════════════════════════
#  Blocks — Turrets
# ═══════════════════════════════════════════════════════════════════════════
block.mjolnir.name=Cối Băng Mjolnir
block.mjolnir.description=Một tháp pháo băng cân bằng. Bắn đạn đông lạnh vỡ vụn khi va chạm, hiệu quả chống lại mục tiêu trên không và mặt đất.

block.gramr.name=Gramr
block.gramr.description=Một tháp pháo bắn nhanh phòng điểm. Tuyệt vời để trấn áp bầy đơn vị hạng nhẹ với tốc độ bắn cao.

block.gungnir.name=Gungnir
block.gungnir.description=Một pháo binh chính xác tầm xa. Đạn hợp kim của nó xuyên thủng áo giáp ở khoảng cách cực xa.

block.hermodr.name=Hermodr
block.hermodr.description=Một tháp pháo hạng trung đa năng cân bằng giữa tốc độ bắn và tầm bắn. Trụ cột của mạng lưới phòng thủ Glacius.

block.laevateinn.name=Laevateinn
block.laevateinn.description=Một tháp pháo phun lửa tầm gần bắn các mảnh lưu huỳnh dễ bay hơi. Tàn phá nhóm bộ binh dày đặc.

block.lopt.name=Lopt
block.lopt.description=Một khẩu pháo hạng nặng bắn đạn nổ cao. Những phát bắn sấm sét của nó làm rung chuyển mặt đất đóng băng hàng dặm.

block.gjallarhorn.name=Gjallarhorn
block.gjallarhorn.description=Một tháp pháo hỗ trợ bắn đạn hợp kim xuyên phá tầm xa. Tiếng vang của nó vọng khắp chiến trường như tiếng tù và.

block.svafnir.name=Svafnir
block.svafnir.description=Một tháp pháo phòng không bắn nhanh với hệ thống nhắm mục tiêu tối ưu cho mối đe dọa trên không. Giữ bầu trời sạch bóng máy bay địch.

block.nidhoggr.name=Nidhoggr
block.nidhoggr.description=Một pháo quay hạng nặng xé nát mọi thứ trên đường đi. Hỏa lực không ngừng của nó áp đảo các vị trí kiên cố.

# ═══════════════════════════════════════════════════════════════════════════
#  Blocks — Power
# ═══════════════════════════════════════════════════════════════════════════
block.yggdrasil-generator.name=Máy Phát Yggdrasil
block.yggdrasil-generator.description=Một máy phát nhỏ gọn chạy bằng năng lượng lạnh. Đốt tinh thể băng để sản xuất điện ổn định cho các tiền đồn nhỏ.

block.yggdrasil-core.name=Lõi Yggdrasil
block.yggdrasil-core.description=Trung tâm năng lượng chính của mạng lưới Yggdrasil. Tạo ra năng lượng khổng lồ từ nguồn địa nhiệt xung quanh.

block.yggdrasil-array.name=Dàn Yggdrasil
block.yggdrasil-array.description=Một dàn năng lượng tầm trung tiêu thụ lưu huỳnh dễ bay hơi để tạo ra năng lượng cao. Một phần của mạng lưới phân phối năng lượng Yggdrasil.

# ═══════════════════════════════════════════════════════════════════════════
#  Blocks — Production
# ═══════════════════════════════════════════════════════════════════════════
block.foundry.name=Lò Đúc Glacius
block.foundry.description=Cơ sở nấu chảy cơ bản chế biến tinh thể băng thành thỏi sắt đông lạnh. Bước đầu tiên trong chuỗi công nghiệp Glacius.

block.refinery.name=Nhà Máy Lọc Glacius
block.refinery.description=Nhà máy lọc tiên tiến kết hợp sắt đông lạnh với tinh thể băng. Sản xuất hợp kim lạnh, vật liệu cốt lõi cho sản xuất cao cấp.

block.fabricator.name=Nhà Máy Chế Tạo Glacius
block.fabricator.description=Nhà máy chế tạo quy mô lớn sản xuất hàng loạt hợp kim lạnh từ nhiều đầu vào. Trái tim của nền công nghiệp Glacius.

block.assembly.name=Trung Tâm Lắp Ráp Glacius
block.assembly.description=Khu phức hợp lắp ráp cuối cùng cho các bộ phận tiên tiến. Kết hợp số lượng lớn nguyên liệu cơ bản thành sản phẩm hợp kim lạnh hoàn chỉnh.

# ═══════════════════════════════════════════════════════════════════════════
#  Blocks — Distribution
# ═══════════════════════════════════════════════════════════════════════════
block.conduit.name=Ống Dẫn Glacius
block.conduit.description=Một ống dẫn chất lỏng gia cố được thiết kế cho vận chuyển chất lỏng lạnh. Chống đóng băng và duy trì dòng chảy trong giá lạnh cực độ.

block.duct.name=Máng Dẫn Glacius
block.duct.description=Một máng vận chuyển hàng hóa hạng nặng được xây dựng cho điều kiện băng giá. Di chuyển tài nguyên hiệu quả qua các cơ sở Glacius.

# ═══════════════════════════════════════════════════════════════════════════
#  Units — Air
# ═══════════════════════════════════════════════════════════════════════════
unit.herja.name=Herja
unit.herja.description=Máy bay trinh sát nhanh nhẹn. Herja lướt qua bầu trời băng giá, do thám vị trí địch với cảm biến băng tiên tiến.

unit.eir.name=Eir
unit.eir.description=Máy bay tiêm kích-ném bom linh hoạt với giáp cải tiến. Eir thực hiện các đòn tấn công chính xác vào mục tiêu mặt đất trước khi rút lui an toàn.

unit.hlokk.name=Hlokk
unit.hlokk.description=Máy bay tiêm kích hạng nặng chiếm ưu thế trên không. Hlokk thống trị bầu trời với pháo mạnh và lá chắn băng gia cố.

unit.gondul.name=Gondul
unit.gondul.description=Một tàu chiến trên không tinh nhuệ với đầy đủ hệ thống vũ khí. Gondul dẫn đầu các cuộc tấn công đường không với hỏa lực hủy diệt.

unit.skogul.name=Skogul
unit.skogul.description=Đỉnh cao của công nghệ hàng không Glacius. Một pháo đài bay khổng lồ mang đến sự hủy diệt từ trên cao, được bọc thép để chống lại mọi đòn phản công.

# ═══════════════════════════════════════════════════════════════════════════
#  Units — Mech
# ═══════════════════════════════════════════════════════════════════════════
unit.jotunn.name=Jotunn
unit.jotunn.description=Một mech hai chân chắc chắn được thiết kế cho chiến tranh băng giá. Chậm nhưng bọc thép dày, nó tiến quân qua bão tuyết để giao chiến với kẻ thù.

unit.ymir.name=Ymir
unit.ymir.description=Một mech tấn công nâng cấp với áo giáp dày hơn. Ymir xông trận, nghiền nát băng và kẻ thù dưới chân nó.

unit.thrymr.name=Thrymr
unit.thrymr.description=Một mech công thành với pháo tầm xa. Đôi chân mạnh mẽ của nó giữ thăng bằng trước lực giật của vũ khí hủy diệt.

unit.bergelmir.name=Bergelmir
unit.bergelmir.description=Một cỗ máy chiến tranh cổ đại được đánh thức từ băng. Cao như núi, nó làm rung chuyển chiến trường với mỗi bước đi nặng nề.

unit.surtr.name=Surtr
unit.surtr.description=Mech Glacius tối thượng, một ngọn núi lửa hủy diệt biết đi. Lò nung bên trong nó nóng đến mức băng tan chảy hàng dặm xung quanh.

# ═══════════════════════════════════════════════════════════════════════════
#  Units — Naval
# ═══════════════════════════════════════════════════════════════════════════
unit.aegir.name=Aegir
unit.aegir.description=Một tàu tuần tra nhanh nhẹn lướt trên đại dương băng giá Erisa. Nhanh và linh hoạt, nó quấy rối bờ biển địch bằng các đòn đánh và chạy.

unit.ran.name=Ran
unit.ran.description=Một tàu hộ tống bọc thép tuần tra vùng nước sâu. Thân tàu gia cố chịu được cả hỏa lực địch và áp lực băng nghiền nát.

unit.njordr.name=Njordr
unit.njordr.description=Một tàu khu trục hạng nặng thiết kế cho các chiến dịch hải quân kéo dài. Nó phóng hỏa lực qua biển băng với đại bác sườn đáng gờm.

unit.jormun.name=Jormun
unit.jormun.description=Một tàu chiến rắn biển khổng lồ. Thân tàu lượn sóng của nó cắt qua các tảng băng khi săn tìm hạm đội địch.

unit.lyngbakr.name=Lyngbakr
unit.lyngbakr.description=Một tàu lớp leviathan khổng lồ, giống hòn đảo hơn là tàu. Nó mang đủ hỏa lực để san bằng các công sự ven biển một mình.

