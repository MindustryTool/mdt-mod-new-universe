# ── New Universe Mod — English Localization ──────────────────────────────
# All content items with lore descriptions for the Borealis system.

# ═══════════════════════════════════════════════════════════════════════════
#  Planets
# ═══════════════════════════════════════════════════════════════════════════
planet.borealis.name=Borealis
planet.borealis.description=A dim red dwarf star at the heart of an uncharted system. Its faint glow barely reaches the frozen worlds orbiting it.

planet.erisa.name=Erisa
planet.erisa.description=A cold rocky planet in the Borealis system, covered in cryovolcanic ice fields and mineral-rich permafrost. The harsh climate hides valuable resources beneath layers of eternal frost.

# ═══════════════════════════════════════════════════════════════════════════
#  Items
# ═══════════════════════════════════════════════════════════════════════════

item.aurum.name=Aurum
item.aurum.description=Gold-like conductive metal found deep within Erisa's volcanic vents. Its superior conductivity makes it invaluable for advanced electronics and energy transmission.

item.cophalast.name=Cophalast
item.cophalast.description=A volatile mineral compound formed in Erisa's tectonic fissures. Its explosive properties make it a strategic resource for munitions manufacturing.

item.duras.name=Duras
item.duras.description=An ultra-hard structural alloy named for its durability. Used in heavy armor plating and load-bearing frameworks across all Glacius installations.

item.fabris.name=Fabris
item.fabris.description=A versatile manufacturing composite prized for its malleability. Easy to shape into precision components while maintaining structural integrity.

item.ferraloy.name=Ferraloy
item.ferraloy.description=A ferrous-alloy composite developed through advanced refinement processes. Its molecular stability makes it ideal for precision instruments and weapon systems.

item.flaxol.name=Flaxol
item.flaxol.description=A cyan cryo-coolant fluid extracted from Erisa's subsurface oceans. Essential for thermal regulation in extreme-temperature industrial processes.

item.fortial.name=Fortial
item.fortial.description=Reinforced composite plating designed for maximum impact resistance. Every Glacius warship relies on fortial layers for critical armor protection.

item.horani.name=Horani
item.horani.description=A rare radioactive crystal that emits a distinct green glow. Extremely hazardous to handle, it is a potent energy source for experimental reactor designs.

item.navitas.name=Navitas
item.navitas.description=An energy-dense fuel compound derived from processed hydrocarbons. Its high flammability makes it the primary propellant for Glacius thrusters and power generators.

item.pausis.name=Pausis
item.pausis.description=A deep-blue stabilizer compound that dampens thermal fluctuations. Indispensable for maintaining safe operating conditions in cryo-processing facilities.

item.rudis.name=Rudis
item.rudis.description=Raw, unprocessed mineral ore direct from Erisa's open-pit mines. Rough and impure, it must be refined before use in advanced manufacturing.

item.sand.name=Sand
item.sand.description=Silicaceous sand grains weathered from Erisa's rocky highlands. A basic but essential material for glass production and construction.

item.simus.name=Simus
item.simus.description=Uniform processed metal plates, cold-rolled to precise specifications. The foundation material for all Glacius structural engineering.

item.tempered-glass.name=Tempered Glass
item.tempered-glass.description=Heat-resistant glass compound engineered to withstand Erisa's extreme temperature swings. Used in viewports, optical systems, and reactor shielding.

item.tentias.name=Tentias
item.tentias.description=An organic polymer fiber with remarkable tensile strength, harvested from deep-cave organisms. Its flexible, resilient structure enables advanced composite manufacturing.

item.vastum.name=Vastum
item.vastum.description=Hazardous waste byproduct from industrial processing. Slightly radioactive and heavily contaminated, it must be carefully stored to prevent environmental damage.

item.viscosy.name=Viscosy
item.viscosy.description=A thick, dark industrial lubricant derived from organic sediments. Its viscous properties reduce friction in heavy machinery operating at subzero temperatures.

item.xearula.name=Xearula
item.xearula.description=An exotic magenta crystal of unknown origin, pulsing with internal energy. Extremely rare and immensely valuable, it is sought after for advanced energy research.

# ═══════════════════════════════════════════════════════════════════════════
#  Blocks — Floors
# ═══════════════════════════════════════════════════════════════════════════
block.ice.name=Glacius Ice
block.ice.description=Dense ice sheet covering the surface of Erisa. Slippery and cold, it slows movement but conceals valuable resources beneath.

block.regolith.name=Glacius Regolith
block.regolith.description=Crushed rock and mineral dust blanketing Erisa's highlands. Stable terrain suitable for infrastructure development.

block.permafrost.name=Glacius Permafrost
block.permafrost.description=Permanently frozen ground rich with trapped minerals. The foundation of all Glacius colony construction.

block.vent.name=Glacius Vent
block.vent.description=Cryovolcanic vent emitting warm mineral vapors. The heat creates rare mineral deposits around its opening.

block.deep-ice.name=Deep Ice
block.deep-ice.description=Ancient compressed ice from the depths of Erisa's glaciers. Too dense to walk on safely — units will drown in the freezing slush.

block.snow.name=Glacius Snow
block.snow.description=Fine crystalline snow that drifts across the surface. Beautiful but treacherous, slowing all ground movement.

block.crust.name=Glacius Crust
block.crust.description=Hardened volcanic crust formed by ancient eruptions. Provides stable footing near thermal zones.

block.slag-ice.name=Slag Ice
block.slag-ice.description=Melted and refrozen ice mixed with volcanic minerals. This treacherous slush flows like a liquid across warm terrain.

# ═══════════════════════════════════════════════════════════════════════════
#  Blocks — Walls
# ═══════════════════════════════════════════════════════════════════════════
block.ice-wall.name=Ice Wall
block.ice-wall.description=A natural barrier of compressed ice. Protects against enemy fire and environmental hazards.

block.regolith-wall.name=Regolith Wall
block.regolith-wall.description=A sturdy wall of compacted regolith. Basic but reliable defensive cover.

block.crystal-wall.name=Crystal Wall
block.crystal-wall.description=A wall of crystallized minerals glowing with blue energy. More durable than standard stone walls.

block.volcanic-wall.name=Volcanic Wall
block.volcanic-wall.description=A barrier formed from cooled volcanic rock. Its dark surface absorbs heat and provides excellent protection.

# ═══════════════════════════════════════════════════════════════════════════
#  Blocks — Ores
# ═══════════════════════════════════════════════════════════════════════════

block.ore-cophalast.name=Cophalast Ore
block.ore-cophalast.description=Reddish mineral veins running through tectonic rock. Rich in explosive compounds.

block.ore-duras.name=Duras Ore
block.ore-duras.description=Dense metallic ore deposits with exceptional hardness. The source of structural duras alloy.

block.ore-navitas.name=Navitas Ore
block.ore-navitas.description=Brilliant yellow energy-rich deposits that seem to emit their own light. A concentrated fuel source.

block.ore-pausis.name=Pausis Ore
block.ore-pausis.description=Deep-blue stabilizer veins embedded in cave walls. Essential for thermal regulation technology.

block.ore-vastum.name=Vastum Ore
block.ore-vastum.description=Contaminated waste deposits, the leftover residue of industrial processing. Slightly hazardous to handle.

# ═══════════════════════════════════════════════════════════════════════════
#  Blocks — Turrets
# ═══════════════════════════════════════════════════════════════════════════
block.mjolnir.name=Mjolnir
block.mjolnir.description=A balanced cryo cannon turret. Fires freezing projectiles that shatter on impact, effective against ground and air targets.

block.gramr.name=Gramr
block.gramr.description=A rapid-fire point-defense turret. Excellent for suppressing swarms of light units with its high rate of fire.

block.gungnir.name=Gungnir
block.gungnir.description=A long-range precision artillery piece. Its alloy-tipped projectiles pierce armor at extreme distances.

block.hermodr.name=Hermodr
block.hermodr.description=A versatile medium turret balancing fire rate and range. The workhorse of Glacius defensive networks.

block.laevateinn.name=Laevateinn
block.laevateinn.description=A close-range flamethrower turret that launches volatile sulfur fragments. Devastating against grouped infantry.

block.lopt.name=Lopt
block.lopt.description=A massive artillery cannon delivering high-explosive shells. Its thunderous shots shake the frozen ground for miles.

block.gjallarhorn.name=Gjallarhorn
block.gjallarhorn.description=A support turret firing piercing alloy rounds at long range. Its report echoes across the battlefield like a horn.

block.svafnir.name=Svafnir
block.svafnir.description=An anti-air rapid turret with targeting systems optimized for aerial threats. Keeps the skies clear of enemy aircraft.

block.nidhoggr.name=Nidhoggr
block.nidhoggr.description=A heavy rotary cannon that shreds everything in its path. Its relentless firepower overwhelms fortified positions.

# ═══════════════════════════════════════════════════════════════════════════
#  Blocks — Power
# ═══════════════════════════════════════════════════════════════════════════
block.yggdrasil-generator.name=Yggdrasil Generator
block.yggdrasil-generator.description=A compact cryo-powered generator. Burns cryo crystals to produce steady electrical power for small outposts.

block.yggdrasil-core.name=Yggdrasil Core
block.yggdrasil-core.description=The main power hub of the Yggdrasil network. Generates massive energy from ambient geothermal sources.

block.yggdrasil-array.name=Yggdrasil Array
block.yggdrasil-array.description=A medium-scale power array consuming volatile sulfur for high energy output. Part of the Yggdrasil power distribution network.

# ═══════════════════════════════════════════════════════════════════════════
#  Blocks — Production
# ═══════════════════════════════════════════════════════════════════════════
block.foundry.name=Glacius Foundry
block.foundry.description=Basic smelting facility that processes cryo crystals into frozen iron ingots. The first step in the Glacius industrial chain.

block.refinery.name=Glacius Refinery
block.refinery.description=Advanced refinery combining frozen iron with cryo crystals. Produces cryo alloy, the core material for high-end manufacturing.

block.fabricator.name=Glacius Fabricator
block.fabricator.description=Large-scale fabrication plant that mass-produces cryo alloy from multiple inputs. The heart of Glacius industry.

block.assembly.name=Glacius Assembly
block.assembly.description=Final assembly complex for advanced components. Combines large quantities of base materials into finished cryo alloy products.

# ═══════════════════════════════════════════════════════════════════════════
#  Blocks — Distribution
# ═══════════════════════════════════════════════════════════════════════════
block.conduit.name=Glacius Conduit
block.conduit.description=A reinforced liquid conduit designed for cryo-fluid transport. Resists freezing and maintains flow in extreme cold.

block.duct.name=Glacius Duct
block.duct.description=A heavy-duty item transport duct built for arctic conditions. Moves resources efficiently across Glacius facilities.

# ═══════════════════════════════════════════════════════════════════════════
#  Units — Air
# ═══════════════════════════════════════════════════════════════════════════
unit.herja.name=Herja
unit.herja.description=A swift reconnaissance aircraft. The Herja darts through frozen skies, scouting enemy positions with cryo-enhanced sensors.

unit.eir.name=Eir
unit.eir.description=An agile fighter-bomber with improved armor. The Eir delivers precision strikes against ground targets before retreating to safety.

unit.hlokk.name=Hlokk
unit.hlokk.description=A heavy air superiority fighter. The Hlokk dominates the skies with powerful cannons and reinforced cryo shielding.

unit.gondul.name=Gondul
unit.gondul.description=An elite aerial warship bristling with weapon systems. The Gondul leads aerial assaults with devastating firepower.

unit.skogul.name=Skogul
unit.skogul.description=The apex of Glacius aviation technology. A colossal flying fortress that brings annihilation from above, armored to withstand any counterattack.

# ═══════════════════════════════════════════════════════════════════════════
#  Units — Mech
# ═══════════════════════════════════════════════════════════════════════════
unit.jotunn.name=Jotunn
unit.jotunn.description=A rugged bipedal mech designed for arctic warfare. Slow but heavily armored, it advances through blizzards to engage the enemy.

unit.ymir.name=Ymir
unit.ymir.description=An upgraded assault mech with thicker armor plating. The Ymir charges into battle, crushing ice and enemies beneath its feet.

unit.thrymr.name=Thrymr
unit.thrymr.description=A siege mech armed with long-range cannons. Its powerful legs stabilize against the recoil of its devastating weaponry.

unit.bergelmir.name=Bergelmir
unit.bergelmir.description=An ancient war machine awakened from the ice. Mountainous in stature, it shakes the battlefield with every ponderous step.

unit.surtr.name=Surtr
unit.surtr.description=The ultimate Glacius mech, a walking volcano of destruction. Its internal furnaces burn so hot that ice melts for miles around.

# ═══════════════════════════════════════════════════════════════════════════
#  Units — Naval
# ═══════════════════════════════════════════════════════════════════════════
unit.aegir.name=Aegir
unit.aegir.description=A nimble patrol boat that skims across Erisa's frozen oceans. Quick and agile, it harasses enemy shorelines with hit-and-run attacks.

unit.ran.name=Ran
unit.ran.description=An armored corvette that patrols deep waters. Its reinforced hull withstands both enemy fire and crushing ice pressure.

unit.njordr.name=Njordr
unit.njordr.description=A heavy frigate designed for extended naval campaigns. It projects power across the frozen seas with formidable broadside cannons.

unit.jormun.name=Jormun
unit.jormun.description=A massive sea serpent of a warship. Its undulating hull slices through ice floes as it hunts enemy fleets.

unit.lyngbakr.name=Lyngbakr
unit.lyngbakr.description=A colossal leviathan-class vessel, more island than ship. It carries enough firepower to level coastal fortifications single-handedly.

# ═══════════════════════════════════════════════════════════════════════════
#  Units — Special
# ═══════════════════════════════════════════════════════════════════════════
unit.spearhead.name=Spearhead
unit.spearhead.description=A heavy flying dreadnought designed to spearhead assaults. Its thick armor and devastating weapons make it the tip of the Glacius spear.

unit.altiar.name=Altair
unit.altiar.description=A versatile aerial support gunship. Provides covering fire and tactical support, adapting to any combat situation with modular weapon mounts.


# ═══════════════════════════════════════════════════════════════════════════
#  Units — Flying-2 Attacker (Fenrir Line)
# ═══════════════════════════════════════════════════════════════════════════
unit.fenrir.name=Fenrir
unit.fenrir.description=A swift frost-wyvern that harries enemies with cryo shards. Its icy breath chills the battlefield before the main assault.

unit.garmr.name=Garmr
unit.garmr.description=A fearsome hound of the frozen wastes, its crystalline armor reflects the pale starlight. It hunts in packs, tearing apart isolated targets.

unit.draugr.name=Draugr
unit.draugr.description=An undead frost giant awakened from ancient glaciers. It wields cursed ice weapons that drain the warmth from living matter.

unit.ragnar.name=Ragnar
unit.ragnar.description=The bringer of the final winter. This colossal wyrm commands blizzards and flash-freezes entire squadrons with its cryo-laser breath.

# ═══════════════════════════════════════════════════════════════════════════
#  Units — Flying-3 Attacker (Diphda Line)
# ═══════════════════════════════════════════════════════════════════════════
unit.diphda.name=Diphda
unit.diphda.description=A lightweight scout drone armed with twin laser emitters. Its rapid-fire volleys overwhelm point defenses through sheer volume.

unit.procyon.name=Procyon
unit.procyon.description=An upgraded laser striker with focused optics. Its refined beam projectors carve through armor with surgical precision.

unit.sirius.name=Sirius
unit.sirius.description=The brightest star in the Glacius fleet. A deadly gunship that combines point-laser cannons with supporting beam turrets.

# ═══════════════════════════════════════════════════════════════════════════
#  Units — Supporter Line (Norse Gods)
# ═══════════════════════════════════════════════════════════════════════════
unit.mimir.name=Mimir
unit.mimir.description=A wise support drone named after the keeper of wisdom. It patrols the battlefield, emitting regenerative pulses to mend damaged allies.

unit.hermodr.name=Hermodr
unit.hermodr.description=The swift messenger of the gods. This support craft rushes to endangered units, deploying repair fields that restore combat effectiveness.

unit.bragi.name=Bragi
unit.bragi.description=The skald of battle, whose laser hymns inspire allies. Its harmonic beams both mend friendly armor and disrupt enemy targeting systems.

unit.forseti.name=Forseti
unit.forseti.description=The mediator of conflicts, this formidable support ship enforces peace by overclocking allied systems. Its aura boosts friendly fire rates dramatically.

unit.tyr.name=Tyr
unit.tyr.description=The god of war and justice. This imposing command ship projects a formidable energy shield while directing the battlefield with powerful healing beams.

unit.vidarr.name=Vidarr
unit.vidarr.description=The silent avenger of the gods. This ultimate support fortress combines devastating firepower with dual shielding and repair systems.

# ═══════════════════════════════════════════════════════════════════════════
#  Units — Core Ground (Einherjar)
# ═══════════════════════════════════════════════════════════════════════════
unit.einherjar.name=Einherjar
unit.einherjar.description=A Valhalla-bound warrior mech, freshly risen from the ice. Its standard-issue cannon fires cryo-hardened rounds at approaching enemies.

unit.berserkr.name=Berserkr
unit.berserkr.description=A rage-fueled assault mech that charges into the thick of battle. Its twin cannons deliver explosive payloads that shatter armor and ice alike.

unit.ulfhednar.name=Ulfhednar
unit.ulfhednar.description=A wolf-clad veteran of countless campaigns. This heavy mech wields a devastating siege cannon, pounding fortifications into rubble from afar.
