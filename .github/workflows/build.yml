name: Build

on:
  push:
    branches: [ "main", "master" ] # Chạy build khi push lên nhánh chính
    tags:
      - 'v*' # Chạy build VÀ tạo release khi push tag dạng v1.0, v2.0.0...
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # Cấp quyền cho GitHub Actions tạo Release và upload asset
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew deploy

      # 1. Upload artifact lên tab Actions (Giữ lại từ file cũ của bạn)
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-universe-desktop
          path: build/libs/*.jar # Sẽ lấy file .jar duy nhất còn lại sau khi deploy

      # 2. Tự động đăng Release mới khi bạn push Tag
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') # Chỉ chạy step này nếu là push tag
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          generate_release_notes: true # Tự động tạo changelog dựa trên các commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}